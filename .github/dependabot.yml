version: 2

multi-ecosystem-groups:
  weekly-dependencies:
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies
